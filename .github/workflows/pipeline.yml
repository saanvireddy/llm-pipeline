name: train-eval-deploy

on:
  push:
    branches: [main]
    paths:
      - 'training/**'
      - 'data/processed/**'
      - 'serving/**'
  workflow_dispatch:
jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install "ragas==0.1.21" "langchain==0.2.16" "langchain-community==0.2.16" "langchain-openai==0.1.23" "langchain-huggingface==0.0.3" python-dotenv datasets
      - name: Run Ragas evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python eval/run_eval.py
      - name: Check faithfulness threshold
        run: |
          python -c "
          import pandas as pd
          df = pd.read_csv('eval/results.csv')
          score = df['faithfulness'].mean()
          print(f'faithfulness={score}')
          import sys
          sys.exit(0 if score >= 0.2 else 1)
          "

  build-and-push:
    needs: evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: aws ecr get-login-password | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
      - run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/llm-pipeline-serving:${{ github.sha }} -f docker/Dockerfile .
          docker push ${{ secrets.ECR_REGISTRY }}/llm-pipeline-serving:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: aws eks update-kubeconfig --name llm-pipeline-eks
      - run: |
          helm upgrade --install llm-pipeline k8s/helm \
            -f k8s/helm/values-aws.yaml \
            --set image.tag=${{ github.sha }}