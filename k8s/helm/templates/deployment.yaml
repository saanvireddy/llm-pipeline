apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-serving
  labels:
    app: llm-serving
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: llm-serving
  template:
    metadata:
      labels:
        app: llm-serving
    spec:
      containers:
        - name: serving
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.pineconeApiKeySecretName }}
                  key: api-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30